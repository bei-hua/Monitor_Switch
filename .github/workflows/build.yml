name: Build Windows App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MonitorSwitcher.csproj

      - name: Build
        run: dotnet build MonitorSwitcher.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish MonitorSwitcher.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonitorSwitcher-win-x64
          path: publish/**
