name: Release Windows App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MonitorSwitcher.csproj

      - name: Publish
        run: dotnet publish MonitorSwitcher.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish

      - name: Create Release Archive
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "MonitorSwitcher-${{ github.ref_name }}-win-x64.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonitorSwitcher-${{ github.ref_name }}-win-x64
          path: MonitorSwitcher-${{ github.ref_name }}-win-x64.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: MonitorSwitcher-${{ github.ref_name }}-win-x64.zip
